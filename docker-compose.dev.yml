services:
  api:
    build: .
    env_file: .env
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql+asyncpg://space:space@db:5432/space_dashboard
    volumes:
      - ./src:/app/src
      - ./frontend:/app/frontend
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: space
      POSTGRES_PASSWORD: space
      POSTGRES_DB: space_dashboard
    ports:
      - "5432:5432"
    volumes:
      - pg_dev_data:/var/lib/postgresql/data

volumes:
  pg_dev_data:
